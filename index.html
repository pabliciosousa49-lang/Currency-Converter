<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Conversor de Moedas - DevClub</title>
    <link rel="stylesheet" href="/style.css">
</head>
<body>

    <main class="container">
        <img src="img/logo.png" alt="Logo Conversor" class="logo-topo">

        <section class="conversor-card">
            
            <div class="input-group">
                <label for="select-de">CONVERTER <b>DE:</b></label>
                <select id="select-de">
                    <option value="BRL">R$ Real brasileiro</option>
                    <option value="USD">US$ Dólar americano</option>
                    <option value="EUR">€ Euro</option>
                    <option value="GBP">£ Libra Esterlina</option>
                    <option value="JPY">¥ Iene Japonês</option>
                    <option value="BTC">₿ Bitcoin</option>
                </select>
            </div>

            <div class="input-group">
                <label for="select-para">CONVERTER <b>PARA:</b></label>
                <select id="select-para">
                    <option value="USD" selected>US$ Dólar americano</option>
                    <option value="BRL">R$ Real brasileiro</option>
                    <option value="EUR">€ Euro</option>
                    <option value="GBP">£ Libra Esterlina</option>
                    <option value="JPY">¥ Iene Japonês</option>
                    <option value="BTC">₿ Bitcoin</option>
                </select>
            </div>

            <div class="input-group">
                <label for="input-valor">Valor</label>
                <input type="number" id="input-valor" value="10000" placeholder="Digite o valor">
            </div>

            <button id="botao-converter">Converter</button>

            <div class="resultado-container">
                
                <div class="resultado-bloco">
                    <img src="img/br.png" alt="Bandeira Origem" id="img-de" class="bandeira">
                    <p class="moeda-nome" id="nome-de">Real</p>
                    <p class="moeda-valor" id="valor-de">R$ 10.000,00</p>
                </div>

                <img src="data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='%237733ff'><path d='M20 12l-1.41-1.41L13 16.17V4h-2v12.17l-5.58-5.59L4 12l8 8 8-8z'/></svg>" alt="Seta" class="seta-conversao">

                <div class="resultado-bloco">
                    <img src="img/us.png" alt="Bandeira Destino" id="img-para" class="bandeira">
                    <p class="moeda-nome" id="nome-para">Dólar Americano</p>
                    <p class="moeda-valor" id="valor-para">US$ 2.000,00</p>
                </div>

            </div>

        </section>
    </main>

    <script src="script.js"></script>
</body>
</html>
